schema = "sim.features"

[enforcement.audience]
user = "strict"
framework = "strict"
code = "strict"

[enforcement.surface]
cli = "strict"
docs = "advisory"

[enforcement.specimen]
user = "strict"
framework = "strict"
code = "advisory"

[enforcement.route]
major_entrypoints = "advisory"
frameworks = "advisory"

[[feature]]
id = "feature/sim-tooling/generated-docs"
title = "Generated documentation lanes"
summary = "Generate repo contracts, feature maps, card indexes, index fragments, and managed vault note namespaces through xtask."
owner = "crate/xtask"
audiences = ["code", "framework"]
guidance = "Use this row when adding a generated doc lane, checking generated index artifacts, or synchronizing a managed generated namespace."
claims_anchors = [
  "anchor/crate/xtask",
  "anchor/doc/generated/card-index",
  "anchor/doc/generated/feature-map",
  "anchor/doc/generated/repo-contract",
  "anchor/doc/generated/sim-index-fragment",
  "anchor/export/xtask/browse/catalog",
  "anchor/export/xtask/codec-lisp",
  "anchor/export/xtask/codec/json",
  "anchor/export/xtask/codec/lisp",
  "anchor/export/xtask/doc/chunk-recursive",
  "anchor/export/xtask/registry/catalog",
]
claims_specimens = [
  "spec-test/sim-tooling/src/index_render_tests",
  "spec-test/sim-tooling/src/index_vault_write_tests",
]

[[feature]]
id = "feature/sim-index/core"
title = "SIM Index core"
summary = "Generate, query, route, prove, and check duplicate implementation overlap in the SIM Index graph as a checked constellation surface."
owner = "crate/xtask"
audiences = ["user", "code", "framework"]
guidance = "Use this row when checking whether a feature exists, tracing routes, finding reuse owners, preventing duplicate implementation code, reviewing overlap, or proving the generated index is current."
claims_anchors = [
  "anchor/cli/xtask",
]
claims_surfaces = [
  "cli/xtask",
  "docs/sim-tooling/generated",
]
claims_specimens = [
  "spec-test/sim-tooling/src/index_fixpoint_tests",
  "spec-test/sim-tooling/src/index_vault_graph_tests",
  "spec-test/sim-tooling/src/index_vault_profile_tests",
]

[[feature]]
id = "feature/sim-index/vault-export"
title = "SIM Index vault export"
summary = "Project the public SIM Index into a managed Markdown vault namespace for portable, Obsidian, SeqLog, and Logseq profiles."
owner = "crate/xtask"
audiences = ["user", "code", "framework"]
guidance = "Use this row when exporting Index evidence into a Markdown vault. Authors still add features, routes, and generated documentation through the generated-doc owner; this exporter consumes the checked public graph and writes only its managed namespace."
claims_anchors = [
  "anchor/cli/xtask",
]
claims_surfaces = [
  "cli/xtask",
  "docs/sim-tooling/generated",
]
claims_specimens = [
  "spec-test/sim-tooling/src/index_vault_tests",
]
supports = [
  "feature/sim-index/core",
  "feature/sim-tooling/generated-docs",
]

[[route]]
id = "route/add-generated-doc"
task = "Add a generated doc"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-tooling/generated-docs", why = "The xtask documentation row owns generated doc lanes and index fragments." },
]

[[route]]
id = "route/find-whether-feature-exists"
task = "Find whether a feature exists or reuse existing code"
audiences = ["user", "code", "framework"]
steps = [
  { feature = "feature/sim-index/core", why = "The SIM Index core row owns generated graph queries, strict fixpoint checks, overlap checks, and duplicate implementation prevention." },
  { specimen = "spec-test/sim-tooling/src/index_fixpoint_tests", why = "The checked fixpoint test proves the index can index and validate itself." },
]

[[route]]
id = "route/export-index-to-vault"
task = "Export the SIM Index to a Markdown vault"
audiences = ["user", "code", "framework"]
steps = [
  { feature = "feature/sim-index/core", why = "The SIM Index core row owns the public graph that the vault exporter consumes." },
  { feature = "feature/sim-tooling/generated-docs", why = "The generated-doc row owns the generated documentation evidence that appears in the public Index." },
  { feature = "feature/sim-index/vault-export", why = "The vault export row owns the profile selection, managed namespace, plan, write, and check behavior." },
  { specimen = "spec-test/sim-tooling/src/index_vault_tests", why = "The checked end-to-end specimen proves all vault profiles export the fixture graph, preserve sibling notes, and verify managed namespaces." },
]
