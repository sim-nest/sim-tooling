[package]
name = "xtask"
version = "0.1.0"
edition = "2024"
license = "MPL-2.0"
description = "Repository maintenance tasks."
readme = "README.md"
publish = false
repository = "https://github.com/sim-nest/sim-tooling"
homepage = "https://github.com/sim-nest/sim-tooling"

[workspace]
resolver = "3"
members = [
]

[workspace.package]
edition = "2024"
license = "MPL-2.0"
repository = "https://github.com/sim-nest/sim-tooling"
homepage = "https://github.com/sim-nest/sim-tooling"

[workspace.lints.rust]
unsafe_code = "forbid"

[dependencies]
proc-macro2 = { version = "1", features = ["span-locations"] }
serde_json = "1"
sha2 = "0.10"
sim-codec-json = "0.1.2"
syn = { version = "2", features = ["full"] }
toml = "0.8"

[lints]
workspace = true
